## Shell
################################################################################
[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = " ⚡"

[[battery.display]]
threshold = 30
style = "bold red"

[character]
success_symbol = '[ λ](#7bff00) '
error_symbol = '[ λ](#ff1e00) '

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = '\[[⏱ $duration]($style)\]'
style = 'yellow'

