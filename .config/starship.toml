[git_status]
conflicted = "⚔️ "
ahead = "💨  ${count} "
behind = "🐢  ${count} "
diverged = "🔱 💨  ${ahead_count} 🐢  ${behind_count} "
untracked = "🛤️  ${count} "
stashed = "📦 "
modified = "📝  ${count} "
staged = "🗃️  ${count} "
renamed = "📛  ${count} "
deleted = "🗑️  ${count} "
style = "bright-white"
format = '\[ $all_status $ahead_behind\]'

[git_commit]
commit_hash_length = 8
style = "bold white"
tag_symbol = '🔖 '
disabled = false

