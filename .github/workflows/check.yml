name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dotfiles:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare isolated HOME
        run: |
          mkdir -p "$RUNNER_TEMP/home"
          cp -R "$GITHUB_WORKSPACE" "$RUNNER_TEMP/home/.dotfiles"

      - name: Syntax checks
        working-directory: ${{ runner.temp }}/home/.dotfiles
        run: |
          sh -n bootstrap.sh install.sh scripts/adopt-file.sh scripts/apply-macos-defaults.sh scripts/audit.sh scripts/doctor.sh scripts/list-backups.sh scripts/restore-backup.sh scripts/secret-scan.sh scripts/shellcheck.sh
          zsh -n .zshrc .local/aws_functions.sh .local/misc_functions.sh .local/my_aliases.sh

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Install shellcheck
        run: brew install shellcheck

      - name: ShellCheck
        working-directory: ${{ runner.temp }}/home/.dotfiles
        run: ./scripts/shellcheck.sh

      - name: Secret scan
        working-directory: ${{ runner.temp }}/home/.dotfiles
        run: ./scripts/secret-scan.sh

      - name: Install into isolated HOME
        working-directory: ${{ runner.temp }}/home/.dotfiles
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          ./install.sh
          ./scripts/audit.sh

      - name: Doctor
        working-directory: ${{ runner.temp }}/home/.dotfiles
        env:
          HOME: ${{ runner.temp }}/home
        run: ./scripts/doctor.sh

      - name: Backup helpers
        working-directory: ${{ runner.temp }}/home/.dotfiles
        env:
          HOME: ${{ runner.temp }}/home
        run: |
          ./scripts/list-backups.sh
          if ./scripts/restore-backup.sh missing-backup --dry-run; then
            echo "restore-backup unexpectedly succeeded for a missing backup"
            exit 1
          fi

      - name: macOS defaults dry run
        working-directory: ${{ runner.temp }}/home/.dotfiles
        run: ./scripts/apply-macos-defaults.sh --dry-run --no-restart
